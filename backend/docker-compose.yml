# UniGarden — Full stack (databases + application services)
#
# Usage:
#   docker compose up -d            # start everything
#   docker compose up -d ai-service # start one service + its deps
#   docker compose logs -f ai-service
#
# Copy .env.example to .env and fill in secrets before first run.

services:

  # ══════════════════════════════════════════════════════════════════
  # DATABASES
  # ══════════════════════════════════════════════════════════════════

  user-db:
    image: postgres:16
    container_name: unigarden-user-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-test}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iluvhasini}
      POSTGRES_DB: userdb
    ports:
      - "5435:5432"
    volumes:
      - userdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-test} -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  journal-db:
    image: postgres:16
    container_name: unigarden-journal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-test}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iluvhasini}
      POSTGRES_DB: journaldb
    ports:
      - "5433:5432"
    volumes:
      - journaldb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-test} -d journaldb"]
      interval: 10s
      timeout: 5s
      retries: 5

  calendar-db:
    image: postgres:16
    container_name: unigarden-calendar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-test}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iluvhasini}
      POSTGRES_DB: calendardb
    ports:
      - "5434:5432"
    volumes:
      - calendardb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-test} -d calendardb"]
      interval: 10s
      timeout: 5s
      retries: 5

  journal-cache:
    image: redis:7
    container_name: unigarden-journal-cache
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  house-db:
    image: mongo:7
    container_name: unigarden-house-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-test}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-iluvhasini}
      MONGO_INITDB_DATABASE: house_db
    ports:
      - "27017:27017"
    volumes:
      - housedb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  engagement-db:
    image: mongo:7
    container_name: unigarden-engagement-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-test}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-iluvhasini}
      MONGO_INITDB_DATABASE: engagement_db
    ports:
      - "27018:27017"
    volumes:
      - engagementdb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-db:
    image: mongo:7
    container_name: unigarden-ai-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-test}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-iluvhasini}
      MONGO_INITDB_DATABASE: ai_db
    ports:
      - "27019:27017"
    volumes:
      - aidb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ══════════════════════════════════════════════════════════════════
  # APPLICATION SERVICES
  # ══════════════════════════════════════════════════════════════════

  user-service:
    build: ./services/user-service
    container_name: unigarden-user-service
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      DATABASE_URL: postgresql://${POSTGRES_USER:-test}:${POSTGRES_PASSWORD:-iluvhasini}@user-db:5432/userdb
    depends_on:
      user-db:
        condition: service_healthy

  house-service:
    build: ./services/house-service
    container_name: unigarden-house-service
    restart: unless-stopped
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      MONGO_URI: mongodb://${MONGO_USER:-test}:${MONGO_PASSWORD:-iluvhasini}@house-db:27017/house_db?authSource=admin
    depends_on:
      house-db:
        condition: service_healthy

  journaling-service:
    build: ./services/journaling-service
    container_name: unigarden-journaling-service
    restart: unless-stopped
    ports:
      - "4003:4003"
    environment:
      PORT: 4003
      DATABASE_URL: postgresql://${POSTGRES_USER:-test}:${POSTGRES_PASSWORD:-iluvhasini}@journal-db:5432/journaldb
      REDIS_URL: redis://journal-cache:6379
    depends_on:
      journal-db:
        condition: service_healthy
      journal-cache:
        condition: service_healthy

  engagement-service:
    build: ./services/engagement-service
    container_name: unigarden-engagement-service
    restart: unless-stopped
    ports:
      - "4004:4004"
    environment:
      PORT: 4004
      MONGO_URI: mongodb://${MONGO_USER:-test}:${MONGO_PASSWORD:-iluvhasini}@engagement-db:27017/engagement_db?authSource=admin
    depends_on:
      engagement-db:
        condition: service_healthy

  calendar-service:
    build: ./services/calendar-service
    container_name: unigarden-calendar-service
    restart: unless-stopped
    ports:
      - "4005:4005"
    environment:
      PORT: 4005
      DATABASE_URL: postgresql://${POSTGRES_USER:-test}:${POSTGRES_PASSWORD:-iluvhasini}@calendar-db:5432/calendardb
    depends_on:
      calendar-db:
        condition: service_healthy

  ai-service:
    build: ./services/ai-service
    container_name: unigarden-ai-service
    restart: unless-stopped
    ports:
      - "4006:4006"
    environment:
      PORT: 4006
      GROQ_API_KEY: ${GROQ_API_KEY}
      MONGO_URI: mongodb://${MONGO_USER:-test}:${MONGO_PASSWORD:-iluvhasini}@ai-db:27017/ai_db?authSource=admin
    depends_on:
      ai-db:
        condition: service_healthy

volumes:
  userdb_data:
  journaldb_data:
  calendardb_data:
  housedb_data:
  engagementdb_data:
  aidb_data:
