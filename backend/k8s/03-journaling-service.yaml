apiVersion: apps/v1
kind: Deployment
metadata:
  name: journaling-service
  namespace: unigarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app: journaling-service
  template:
    metadata:
      labels:
        app: journaling-service
    spec:
      containers:
        - name: journaling-service
          image: unigarden/journaling-service:latest
          ports:
            - containerPort: 4003
          env:
            - name: PORT
              value: "4003"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-journal:5432/journaldb
            - name: REDIS_URL
              value: redis://redis-journal:6379
          readinessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: journaling-service
  namespace: unigarden
spec:
  selector:
    app: journaling-service
  ports:
    - port: 4003
      targetPort: 4003
  type: ClusterIP
