# Fill in real values before applying.
# stringData is plain-text — Kubernetes base64-encodes it automatically.
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: unigarden
type: Opaque
stringData:
  POSTGRES_USER: "test"
  POSTGRES_PASSWORD: "change-me"
  MONGO_USER: "test"
  MONGO_PASSWORD: "change-me"
---
apiVersion: v1
kind: Secret
metadata:
  name: api-keys
  namespace: unigarden
type: Opaque
stringData:
  GROQ_API_KEY: "gsk_replace-me"
