apiVersion: apps/v1
kind: Deployment
metadata:
  name: engagement-service
  namespace: unigarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engagement-service
  template:
    metadata:
      labels:
        app: engagement-service
    spec:
      containers:
        - name: engagement-service
          image: unigarden/engagement-service:latest
          ports:
            - containerPort: 4004
          env:
            - name: PORT
              value: "4004"
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: MONGO_USER
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: MONGO_PASSWORD
            - name: MONGO_URI
              value: mongodb://$(MONGO_USER):$(MONGO_PASSWORD)@mongo-engagement:27017/engagement_db?authSource=admin
          readinessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: engagement-service
  namespace: unigarden
spec:
  selector:
    app: engagement-service
  ports:
    - port: 4004
      targetPort: 4004
  type: ClusterIP
