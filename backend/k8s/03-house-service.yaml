apiVersion: apps/v1
kind: Deployment
metadata:
  name: house-service
  namespace: unigarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app: house-service
  template:
    metadata:
      labels:
        app: house-service
    spec:
      containers:
        - name: house-service
          image: unigarden/house-service:latest
          ports:
            - containerPort: 4002
          env:
            - name: PORT
              value: "4002"
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: MONGO_USER
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: MONGO_PASSWORD
            - name: MONGO_URI
              value: mongodb://$(MONGO_USER):$(MONGO_PASSWORD)@mongo-house:27017/house_db?authSource=admin
          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: house-service
  namespace: unigarden
spec:
  selector:
    app: house-service
  ports:
    - port: 4002
      targetPort: 4002
  type: ClusterIP
