# ── Redis: journal-cache (volatile — no persistence) ─────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-journal
  namespace: unigarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-journal
  template:
    metadata:
      labels:
        app: redis-journal
    spec:
      containers:
        - name: redis
          image: redis:7
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis-journal
  namespace: unigarden
spec:
  selector:
    app: redis-journal
  ports:
    - port: 6379
---
# ── MongoDB: house-db ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-house
  namespace: unigarden
spec:
  serviceName: mongo-house
  replicas: 1
  selector:
    matchLabels:
      app: mongo-house
  template:
    metadata:
      labels:
        app: mongo-house
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: MONGO_USER
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: MONGO_PASSWORD
            - name: MONGO_INITDB_DATABASE
              value: house_db
          volumeMounts:
            - name: data
              mountPath: /data/db
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-house
  namespace: unigarden
spec:
  selector:
    app: mongo-house
  ports:
    - port: 27017
---
