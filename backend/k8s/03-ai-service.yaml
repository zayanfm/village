apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: unigarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: unigarden/ai-service:latest
          ports:
            - containerPort: 4006
          env:
            - name: PORT
              value: "4006"
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: GROQ_API_KEY
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: MONGO_USER
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: MONGO_PASSWORD
            - name: MONGO_URI
              value: mongodb://$(MONGO_USER):$(MONGO_PASSWORD)@mongo-ai:27017/ai_db?authSource=admin
          readinessProbe:
            httpGet:
              path: /health
              port: 4006
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: unigarden
spec:
  selector:
    app: ai-service
  ports:
    - port: 4006
      targetPort: 4006
  type: ClusterIP
