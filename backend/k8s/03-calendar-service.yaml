apiVersion: apps/v1
kind: Deployment
metadata:
  name: calendar-service
  namespace: unigarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calendar-service
  template:
    metadata:
      labels:
        app: calendar-service
    spec:
      containers:
        - name: calendar-service
          image: unigarden/calendar-service:latest
          ports:
            - containerPort: 4005
          env:
            - name: PORT
              value: "4005"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-calendar:5432/calendardb
          readinessProbe:
            httpGet:
              path: /health
              port: 4005
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: calendar-service
  namespace: unigarden
spec:
  selector:
    app: calendar-service
  ports:
    - port: 4005
      targetPort: 4005
  type: ClusterIP
